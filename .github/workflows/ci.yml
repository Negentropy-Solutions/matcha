name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    name: Lint (pre-commit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install pre-commit
        run: python -m pip install --upgrade pip pre-commit

      - name: Run pre-commit
        run: pre-commit run --all-files

  server-tests:
    name: Server tests (Frappe/ERPNext v16)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    services:
      mariadb:
        image: mariadb:11.8
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mariadb-admin ping -h 127.0.0.1 -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python (v16 dependency minimum)
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          allow-prereleases: true

      - name: Set up Node (v16 dependency minimum)
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            wkhtmltopdf \
            xvfb \
            fonts-dejavu \
            libcups2 \
            libxrender1 \
            libxext6 \
            libx11-6

      - name: Install bench
        run: |
          python -m pip install --upgrade pip
          pip install frappe-bench

      - name: Init bench (Frappe v16)
        run: |
          bench init --frappe-branch version-16 --skip-redis-config-generation --python python3 bench-ci

      - name: Configure bench Redis URLs for CI service
        working-directory: bench-ci
        run: |
          bench set-config -g redis_cache "redis://127.0.0.1:6379"
          bench set-config -g redis_queue "redis://127.0.0.1:6379"
          bench set-config -g redis_socketio "redis://127.0.0.1:6379"

      - name: Get apps
        working-directory: bench-ci
        run: |
          bench get-app --branch version-16 erpnext https://github.com/frappe/erpnext.git
          bench get-app matcha $GITHUB_WORKSPACE

      - name: Create site
        working-directory: bench-ci
        env:
          DB_HOST: 127.0.0.1
        run: |
          bench new-site test.localhost \
            --admin-password admin \
            --db-host "$DB_HOST" \
            --db-root-password root \
            --no-mariadb-socket \
            --install-app erpnext \
            --install-app matcha

      - name: Run app tests
        working-directory: bench-ci
        run: |
          bench --site test.localhost run-tests --app matcha

